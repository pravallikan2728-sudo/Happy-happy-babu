<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Bujji💜</title>
    <link rel="stylesheet" href="style.css">
    <link

<body class="fade-in">

    <div id="hearts-container" class="floating-hearts-bg"></div>

        <div class="animation-stage">
            <!-- Ultra Attractive Vector Teddy Bear with Heart -->
            <img src="images/teddy.svg" class="svg-teddy" alt="Adorable Teddy Holding a Hear" />
        </div>

        <div class="action-container fade-in-up delay-2">
            <p class="message" style="margin-bottom: 20px;">I made something special just for your Smile.</p>
            <button id="startBtn" class="premium-button">Do you wanna see???</button>
        </div>
    </main>

    <script src="script.js"></script>
